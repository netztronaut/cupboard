apiVersion: rbac.authorization.k8s.io/v1
{{- if .Values.rbac.namespaced }}
kind: Role
{{- else }}
kind: ClusterRole
{{- end }}
metadata:
{{- if .Values.rbac.namespaced }}
{{- end }}
  name: {{ include ( printf "%s.%s" .Chart.Name "resourceName" ) (dict "suffix" "manager-role" "context" $) }}
rules:
- apiGroups:
  - ""
  resources:
  - services
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - dashboard.netztronaut.de
  resources:
  - bookmarkgroups
  - bookmarks
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - forecastle.stakater.com
  resources:
  - forecastleapps
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - gateway.networking.k8s.io
  resources:
  - httproutes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - route.openshift.io
  resources:
  - routes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - traefik.containo.us
  - traefik.io
  resources:
  - ingressroutes
  verbs:
  - get
  - list
  - watch
