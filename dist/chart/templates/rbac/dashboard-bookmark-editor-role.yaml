{{- if .Values.rbac.helpers.enable }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    {{- include ( printf "%s.%s" .Chart.Name "labels" ) . | nindent 4 }}
  name: {{ include ( printf "%s.%s" .Chart.Name "resourceName" ) (dict "suffix" "dashboard-bookmark-editor-role" "context" $) }}
rules:
- apiGroups:
  - dashboard.netztronaut.de
  resources:
  - bookmarks
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - dashboard.netztronaut.de
  resources:
  - bookmarks/status
  verbs:
  - get
{{- end }}
