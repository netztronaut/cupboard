apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    {{- include ( printf "%s.%s" .Chart.Name "labels" ) . | nindent 4 }}
  name: {{ include ( printf "%s.%s" .Chart.Name "resourceName" ) (dict "suffix" "manager-rolebinding" "context" $) }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include ( printf "%s.%s" .Chart.Name "resourceName" ) (dict "suffix" "manager-role" "context" $) }}
subjects:
- kind: ServiceAccount
  name: {{ include ( printf "%s.%s" .Chart.Name "serviceAccountName" ) . }}
