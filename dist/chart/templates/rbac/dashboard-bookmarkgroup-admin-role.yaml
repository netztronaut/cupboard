{{- if .Values.rbac.helpers.enable }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    {{- include ( printf "%s.%s" .Chart.Name "labels" ) . | nindent 4 }}
  name: {{ include ( printf "%s.%s" .Chart.Name "resourceName" ) (dict "suffix" "dashboard-bookmarkgroup-admin-role" "context" $) }}
rules:
- apiGroups:
  - dashboard.netztronaut.de
  resources:
  - bookmarkgroups
  verbs:
  - '*'
- apiGroups:
  - dashboard.netztronaut.de
  resources:
  - bookmarkgroups/status
  verbs:
  - get
{{- end }}
