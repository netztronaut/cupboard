{{- if .Values.webhook.enable }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  annotations:
    {{- if .Values.certManager.enable }}
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include ( printf "%s.%s" .Chart.Name "resourceName" ) (dict "suffix" "serving-cert" "context" $) }}
    {{- end }}
  name: {{ include ( printf "%s.%s" .Chart.Name "resourceName" ) (dict "suffix" "validating-webhook-configuration" "context" $) }}
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: {{ include ( printf "%s.%s" .Chart.Name "resourceName" ) (dict "suffix" "webhook-service" "context" $) }}
      namespace: {{ .Release.Namespace }}
      path: /validate-dashboard-netztronaut-de-v1alpha1-bookmarkgroup
  failurePolicy: Fail
  name: vbookmarkgroup-v1alpha1.kb.io
  rules:
  - apiGroups:
    - dashboard.netztronaut.de
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - bookmarkgroups
  sideEffects: None
{{- end }}
