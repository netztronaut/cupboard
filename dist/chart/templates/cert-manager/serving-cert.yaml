{{- if .Values.certManager.enable }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  labels:
    {{- include ( printf "%s.%s" .Chart.Name "labels" ) . | nindent 4 }}
  name: {{ include ( printf "%s.%s" .Chart.Name "resourceName" ) (dict "suffix" "serving-cert" "context" $) }}
spec:
  dnsNames:
  - {{ include ( printf "%s.%s" .Chart.Name "resourceName" ) (dict "suffix" "webhook-service" "context" $) }}.{{ .Release.Namespace }}.svc
  - {{ include ( printf "%s.%s" .Chart.Name "resourceName" ) (dict "suffix" "webhook-service" "context" $) }}.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: {{ include ( printf "%s.%s" .Chart.Name "resourceName" ) (dict "suffix" "selfsigned-issuer" "context" $) }}
  secretName: webhook-server-cert
{{- end }}
