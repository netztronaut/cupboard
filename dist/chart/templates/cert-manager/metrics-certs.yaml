{{- if and .Values.certManager.enable .Values.metrics.enable .Values.metrics.secure }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  labels:
    {{- include ( printf "%s.%s" .Chart.Name "labels" ) . | nindent 4 }}
  name: {{ include ( printf "%s.%s" .Chart.Name "resourceName" ) (dict "suffix" "metrics-certs" "context" $) }}
spec:
  dnsNames:
  - {{ include ( printf "%s.%s" .Chart.Name "resourceName" ) (dict "suffix" "controller-manager-metrics-service" "context" $) }}.{{ include ( printf "%s.%s" .Chart.Name "namespaceName" ) $ }}.svc
  - {{ include ( printf "%s.%s" .Chart.Name "resourceName" ) (dict "suffix" "controller-manager-metrics-service" "context" $) }}.{{ include ( printf "%s.%s" .Chart.Name "namespaceName" ) $ }}.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: {{ include ( printf "%s.%s" .Chart.Name "resourceName" ) (dict "suffix" "selfsigned-issuer" "context" $) }}
  secretName: metrics-server-cert
{{- end }}
