{{- if .Values.prometheus.enable }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    {{- include ( printf "%s.%s" .Chart.Name "labels" ) . | nindent 4 }}
    control-plane: controller-manager
  name: {{ include ( printf "%s.%s" .Chart.Name "resourceName" ) (dict "suffix" "controller-manager-metrics-monitor" "context" $) }}
spec:
  endpoints:
  - {{- if .Values.metrics.secure }}
    bearerTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
    {{- end }}
    path: /metrics
    port: {{ if .Values.metrics.secure }}https{{ else }}http{{ end }}
    scheme: {{ if .Values.metrics.secure }}https{{ else }}http{{ end }}
    {{- if .Values.metrics.secure }}
    tlsConfig:
      serverName: {{ include ( printf "%s.%s" .Chart.Name "resourceName" ) (dict "suffix" "controller-manager-metrics-service" "context" $) }}.{{ .Release.Namespace }}.svc
      {{- if .Values.certManager.enable }}
      ca:
        secret:
          name: metrics-server-cert
          key: ca.crt
      cert:
        secret:
          name: metrics-server-cert
          key: tls.crt
      keySecret:
        name: metrics-server-cert
        key: tls.key
      {{- else }}
      insecureSkipVerify: true
      {{- end }}
    {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include ( printf "%s.%s" .Chart.Name "name" ) . }}
      control-plane: controller-manager
{{- end }}
