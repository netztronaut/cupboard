{{- if .Values.metrics.enable }}
apiVersion: v1
kind: Service
metadata:
  labels:
    {{- include ( printf "%s.%s" .Chart.Name "labels" ) . | nindent 4 }}
    control-plane: controller-manager
  name: {{ include ( printf "%s.%s" .Chart.Name "resourceName" ) (dict "suffix" "controller-manager-metrics-service" "context" $) }}
spec:
  ports:
  - name: {{ if .Values.metrics.secure }}https{{ else }}http{{ end }}
    port: {{ .Values.metrics.port }}
    protocol: TCP
    targetPort: {{ .Values.metrics.port }}
  selector:
    app.kubernetes.io/name: {{ include ( printf "%s.%s" .Chart.Name "name" ) . }}
    control-plane: controller-manager
{{- end }}
