# Kustomization for LOCAL_TESTING mode with webhooks enabled
# This is a standalone configuration that combines the necessary components
# for local testing without cert-manager (uses pre-generated self-signed certs)

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Build from the individual components, skip cert-manager
resources:
  - ../crd/
  - ../rbac/
  - ../manager/
  - ../webhook/
  - cupboard_web.yaml
  - metrics_service.yaml

configMapGenerator:
  - name: cupboard-config
    files:
      - cupboard.yaml
  - name: custom-theme
    files:
      - page.tmpl=templates/custom-theme/page.tmpl
      - header.tmpl=templates/custom-theme/header.tmpl
      - footer.tmpl=templates/custom-theme/footer.tmpl
      - content.tmpl=templates/custom-theme/content.tmpl
      - group.tmpl=templates/custom-theme/group.tmpl
      - link.tmpl=templates/custom-theme/link.tmpl

# Override namespace for local testing
namespace: local-testing

# Customize for local testing
patches:
  # Enable webhooks and set environment variables
  - target:
      kind: Deployment
      name: controller-manager
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env
        value:
          - name: WATCH_NAMESPACE
            value: local-testing
          - name: ENABLE_WEBHOOKS
            value: "true"
          - name: ENABLE_AUTH
            value: "true"
          - name: SKIP_OIDC_PROBE
            value: "true"
          - name: CUPBOARD_CONFIG
            value: /etc/cupboard/cupboard.yaml
          - name: CUPBOARD_COOKIE_SECRET
            value: local-testing-cookie-secret-change-me
          - name: OIDC_ISSUER_URL
            value: http://auth.localhost/application/o/cupboard/
          - name: OIDC_CLIENT_ID
            value: cupboard-local
          - name: OIDC_REDIRECT_PATH
            value: /auth/callback
          - name: OIDC_SCOPES
            value: openid profile email
          - name: OIDC_USERINFO_ENDPOINT
            value: http://authentik-server.authentik.svc.cluster.local/application/o/userinfo/
          - name: CUPBOARD_TEMPLATE_SET
            value: custom-theme
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: controller:latest
      # Add webhook port and cert path configuration
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
      # Add webhook server port
      - op: add
        path: /spec/template/spec/containers/0/ports/-
        value:
          containerPort: 8082
          name: web
          protocol: TCP
      - op: add
        path: /spec/template/spec/containers/0/ports/-
        value:
          containerPort: 9443
          name: webhook-server
          protocol: TCP
      # Add volume mount for webhook certificates
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/-
        value:
          mountPath: /etc/cupboard
          name: cupboard-config
          readOnly: true
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/-
        value:
          mountPath: /tmp/k8s-webhook-server/serving-certs
          name: webhook-certs
          readOnly: true
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/-
        value:
          mountPath: /templates/custom-theme
          name: custom-theme
          readOnly: true
      # Add webhook certificate volume (from pre-generated secret)
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: cupboard-config
          configMap:
            name: cupboard-config
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: webhook-certs
          secret:
            secretName: webhook-server-cert
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: custom-theme
          configMap:
            name: custom-theme
      # Remove read-only filesystem restriction for webhook certs
      - op: remove
        path: /spec/template/spec/containers/0/securityContext/readOnlyRootFilesystem
      # Set image pull policy to IfNotPresent for local Docker image
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
