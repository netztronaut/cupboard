watchNamespace: local-testing
localTesting: false
enableWebhooks: true

web:
  bindAddress: ":8082"

page:
  templateSet: "default"
  title: "Cup-Board - wieder alle Tassen im Schrank"
  faviconURL: "/favicon.svg"
  contentLayout: "grid"

auth:
  enabled: false

dashboard:
  linkGroups:
    - name: "cloud-platform"
      priority: 10
      priorityClass: "first"
      displayName: "Cloud & Platform"
    - name: "code-devops"
      priority: 20
      displayName: "Code & DevOps"
    - name: "engineering-work"
      priority: 30
      displayName: "Engineering Work"
    - name: "news-community"
      priority: 40
      displayName: "News & Community"
    - name: "social"
      priority: 50
      priorityClass: "last"
      displayName: "Social"

  staticLinks:
