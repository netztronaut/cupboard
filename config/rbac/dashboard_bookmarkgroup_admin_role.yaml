# This rule is not used by the project cupboard itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over dashboard.netztronaut.de.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app.kubernetes.io/name: cupboard
    app.kubernetes.io/managed-by: kustomize
  name: dashboard-bookmarkgroup-admin-role
rules:
- apiGroups:
  - dashboard.netztronaut.de
  resources:
  - bookmarkgroups
  verbs:
  - '*'
- apiGroups:
  - dashboard.netztronaut.de
  resources:
  - bookmarkgroups/status
  verbs:
  - get
