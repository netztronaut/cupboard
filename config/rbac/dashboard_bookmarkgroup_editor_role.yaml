# This rule is not used by the project cupboard itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the dashboard.netztronaut.de.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app.kubernetes.io/name: cupboard
    app.kubernetes.io/managed-by: kustomize
  name: dashboard-bookmarkgroup-editor-role
rules:
- apiGroups:
  - dashboard.netztronaut.de
  resources:
  - bookmarkgroups
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - dashboard.netztronaut.de
  resources:
  - bookmarkgroups/status
  verbs:
  - get
