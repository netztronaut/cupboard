# This rule is not used by the project cupboard itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to dashboard.netztronaut.de resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app.kubernetes.io/name: cupboard
    app.kubernetes.io/managed-by: kustomize
  name: dashboard-bookmarkgroup-viewer-role
rules:
- apiGroups:
  - dashboard.netztronaut.de
  resources:
  - bookmarkgroups
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - dashboard.netztronaut.de
  resources:
  - bookmarkgroups/status
  verbs:
  - get
