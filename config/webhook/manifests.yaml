---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-dashboard-netztronaut-de-v1alpha1-bookmarkgroup
  failurePolicy: Fail
  name: vbookmarkgroup-v1alpha1.kb.io
  rules:
  - apiGroups:
    - dashboard.netztronaut.de
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - bookmarkgroups
  sideEffects: None
